<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CRUD Rows</title>
</head>
<body>
<h1>CRUD Rows</h1>

<h2>Agregar row</h2>
<form method="post" action="/add">
    <p>
        <label>Nombre:
            <input type="text" name="name" required>
        </label>
    </p>
    <p>
        <label>Proveedor:
            <input type="text" name="supplier" required>
        </label>
    </p>
    <p>
        <label>Categoria:
            <input type="text" name="category" required>
        </label>
    </p>
    <p>
        <label>Lenguaje principal:
            <input type="text" name="primaryLanguage" required>
        </label>
    </p>
    <p>
        <label>Lenguaje secundario:
            <input type="text" name="secondaryLanguage" required>
        </label>
    </p>
    <p>
        <label>
            <input type="checkbox" name="useDB" value="true">
            Usa base de datos
        </label>
    </p>
    <p>
        <label>
            <input type="checkbox" name="requiresNetwork" value="true">
            Requiere red
        </label>
    </p>
    <p>
        <label>Numero de bits:
            <input type="number" name="numberOfBits" required>
        </label>
    </p>
    <p>
        <label>Licencia:
            <input type="text" name="license" required>
        </label>
    </p>
    <p>
        <label>Precio:
            <input type="number" step="0.01" name="price" required>
        </label>
    </p>
    <p>
        <label>Descripcion:
            <input type="text" name="description" required>
        </label>
    </p>
    <p>
        <label>Website:
            <input type="number" name="website" required>
        </label>
    </p>
    <p>
        <label>Email:
            <input type="email" name="email" required>
        </label>
    </p>
    <p>
        <label>Tamano instalador:
            <input type="number" name="installerSize" required>
        </label>
    </p>
    <button type="submit">Agregar</button>
</form>

<h2>Rows</h2>
<p th:if="${rows.isEmpty()}">No hay rows registrados.</p>

<div th:each="entry : ${rows}">
    <hr>
    <p>Key: <span th:text="${entry.key}"></span></p>

    <form method="post" action="/update">
        <input type="hidden" name="key" th:value="${entry.key}">
        <p>
            <label>Nombre:
                <input type="text" name="name" th:value="${entry.value.name}" required>
            </label>
        </p>
        <p>
            <label>Proveedor:
                <input type="text" name="supplier" th:value="${entry.value.supplier}" required>
            </label>
        </p>
        <p>
            <label>Categoria:
                <input type="text" name="category" th:value="${entry.value.category}" required>
            </label>
        </p>
        <p>
            <label>Lenguaje principal:
                <input type="text" name="primaryLanguage" th:value="${entry.value.primaryLanguage}" required>
            </label>
        </p>
        <p>
            <label>Lenguaje secundario:
                <input type="text" name="secondaryLanguage" th:value="${entry.value.secondaryLanguage}" required>
            </label>
        </p>
        <p>
            <label>
                <input type="checkbox" name="useDB" value="true" th:checked="${entry.value.useDB}">
                Usa base de datos
            </label>
        </p>
        <p>
            <label>
                <input type="checkbox" name="requiresNetwork" value="true" th:checked="${entry.value.requiresNetwork}">
                Requiere red
            </label>
        </p>
        <p>
            <label>Numero de bits:
                <input type="number" name="numberOfBits" th:value="${entry.value.numberOfBits}" required>
            </label>
        </p>
        <p>
            <label>Licencia:
                <input type="text" name="license" th:value="${entry.value.license}" required>
            </label>
        </p>
        <p>
            <label>Precio:
                <input type="number" step="0.01" name="price" th:value="${entry.value.price}" required>
            </label>
        </p>
        <p>
            <label>Descripcion:
                <input type="text" name="description" th:value="${entry.value.description}" required>
            </label>
        </p>
        <p>
            <label>Website:
                <input type="number" name="website" th:value="${entry.value.website}" required>
            </label>
        </p>
        <p>
            <label>Email:
                <input type="email" name="email" th:value="${entry.value.email}" required>
            </label>
        </p>
        <p>
            <label>Tamano instalador:
                <input type="number" name="installerSize" th:value="${entry.value.installerSize}" required>
            </label>
        </p>
        <button type="submit">Actualizar</button>
    </form>

    <form method="post" action="/remove">
        <input type="hidden" name="key" th:value="${entry.key}">
        <button type="submit">Eliminar</button>
    </form>
</div>
</body>
</html>
